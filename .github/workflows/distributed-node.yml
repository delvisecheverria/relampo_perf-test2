name: 🌩️ Distributed Relampo Test

on:
  workflow_dispatch:

jobs:
  run-nodes:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [1, 2]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup latest Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Install Relampo CLI
        run: |
          curl -fsSL https://dl.relampo.com/install.sh | bash

      - name: Install relampo-worker
        run: |
          RELAMPO_VERSION="$(curl -fsSL https://dl.relampo.com/relampo/latest.txt | tr -d '[:space:]')"
          WORKER_URL="https://dl.relampo.com/relampo/v${RELAMPO_VERSION}/relampo-worker_${RELAMPO_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "$WORKER_URL" -o /tmp/relampo-worker.tar.gz
          tar -xzf /tmp/relampo-worker.tar.gz -C /tmp
          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/relampo-worker "$HOME/.local/bin/relampo-worker"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run worker node
        run: |
          echo "🏁 Starting node ${{ matrix.node }} of 2"
          SCENARIO_PATH='scenarios/delvis.yaml'
          SCENARIO_DIR="$(dirname "$SCENARIO_PATH")"
          SCENARIO_FILE="$(basename "$SCENARIO_PATH")"
          VUS_FLAG=""
          if [ -n "10" ]; then
            VUS_FLAG="--vus 10"
          fi
          DURATION_FLAG=""
          if [ -n "__RELAMPO_DURATION__" ]; then
            DURATION_FLAG="--duration __RELAMPO_DURATION__"
          fi
          set -o pipefail
          (
            cd "$SCENARIO_DIR"
            OUTPUT_FILE="$(mktemp)"
            echo $'\033[38;5;214m⠸ Esto no es magia, relampo solo esta trabajando, pronto te mostrare los resultados.\033[0m'
            RELAMPO_P95_ALERT=0
            relampo_extract_stats() {
              local file="$1"
              local start_line="$2"
              awk -v from="$start_line" '
                BEGIN {
                  count = 0
                  errs = 0
                  sum = 0
                  minv = -1
                  maxv = 0
                  p95 = 0
                  active_last = 0
                  active_max = 0
                }
                NR < from { next }
                {
                  if ($0 !~ /"method":"[A-Z]+"/) next
                  if ($0 ~ /"method":"INFO"/ || $0 ~ /"method":"SYSTEM"/) next
                  lat = 0
                  st = 0
                  if (match($0, /"latency_ms":[0-9.]+/)) {
                    lat_s = substr($0, RSTART + 13, RLENGTH - 13)
                    lat = lat_s + 0
                  }
                  if (match($0, /"status":[0-9]+/)) {
                    st_s = substr($0, RSTART + 9, RLENGTH - 9)
                    st = st_s + 0
                  }
                  count++
                  lats[count] = lat
                  sum += lat
                  if (minv < 0 || lat < minv) minv = lat
                  if (lat > maxv) maxv = lat
                  if (st >= 400) errs++
                  if (match($0, /"concurrency":[0-9]+/)) {
                    conc_s = substr($0, RSTART + 14, RLENGTH - 14)
                    conc = conc_s + 0
                    active_last = conc
                    if (conc > active_max) active_max = conc
                  }
                }
                END {
                  if (count > 0) {
                    for (i = 2; i <= count; i++) {
                      key = lats[i]
                      j = i - 1
                      while (j >= 1 && lats[j] > key) {
                        lats[j + 1] = lats[j]
                        j--
                      }
                      lats[j + 1] = key
                    }
                    pidx = int((count * 95 + 99) / 100)
                    if (pidx < 1) pidx = 1
                    if (pidx > count) pidx = count
                    p95 = lats[pidx]
                  }
                  if (minv < 0) minv = 0
                  printf("%d|%.3f|%.3f|%.3f|%d|%.3f|%d|%d\n", count, sum, minv, maxv, errs, p95, active_last, active_max)
                }
              ' "$file"
            }
            relampo_fmt_hms() {
              local s="$1"
              if [ "$s" -lt 0 ]; then
                s=0
              fi
              printf '%02d:%02d:%02d' $((s / 3600)) $(((s % 3600) / 60)) $((s % 60))
            }
            relampo_print_summary() {
              local prefix="$1"
              local count="$2"
              local elapsed="$3"
              local sum="$4"
              local minv="$5"
              local maxv="$6"
              local errs="$7"
              local p95="$8"
              local active_last="$9"
              local active_max="${10}"
              if [ "$count" -le 0 ]; then
                return
              fi
              if [ "$elapsed" -le 0 ]; then
                elapsed=1
              fi
              local rate avg errpct
              rate="$(awk -v c="$count" -v e="$elapsed" 'BEGIN { printf "%.1f", (e > 0 ? c / e : 0) }')"
              avg="$(awk -v s="$sum" -v c="$count" 'BEGIN { printf "%.1f", (c > 0 ? s / c : 0) }')"
              errpct="$(awk -v e="$errs" -v c="$count" 'BEGIN { printf "%.2f", (c > 0 ? (e * 100.0) / c : 0) }')"
              local p95_alarm=""
              if awk -v v="$p95" 'BEGIN { exit !(v > 8000.0) }'; then
                p95_alarm=" ⚠"
                RELAMPO_P95_ALERT=1
              fi
              printf 'summary %s %7d in %s = %6s/s Avg: %7s Min: %7.1f Max: %7.1f P95: %7.1f%s Active: %3d/%-3d Err: %5d (%6s%%)\n' \
                "$prefix" "$count" "$(relampo_fmt_hms "$elapsed")" "$rate" "$avg" "$minv" "$maxv" "$p95" "$p95_alarm" "$active_last" "$active_max" "$errs" "$errpct"
            }
            RELAMPO_MEM_PEAK_MB=0
            RELAMPO_CPU_PEAK=0
            RELAMPO_GO_PEAK=0
            relampo_update_resource_peaks() {
              local worker_pid="$1"
              local rss_kb cpu_pct rss_mb
              rss_kb="$(ps -p "$worker_pid" -o rss= 2>/dev/null | awk 'NR==1 { print int($1+0) }')"
              cpu_pct="$(ps -p "$worker_pid" -o %cpu= 2>/dev/null | awk 'NR==1 { print $1+0 }')"
              if [ -n "$rss_kb" ] && [ "$rss_kb" -gt 0 ]; then
                rss_mb=$(( (rss_kb + 1023) / 1024 ))
                if [ "$rss_mb" -gt "$RELAMPO_MEM_PEAK_MB" ]; then
                  RELAMPO_MEM_PEAK_MB="$rss_mb"
                fi
              fi
              if [ -n "$cpu_pct" ]; then
                RELAMPO_CPU_PEAK="$(awk -v a="$RELAMPO_CPU_PEAK" -v b="$cpu_pct" 'BEGIN { if (b > a) printf "%.1f", b; else printf "%.1f", a }')"
              fi
              local go_count
              go_count="$(curl -fsS --max-time 1 "http://127.0.0.1:6060/debug/pprof/goroutine?debug=1" 2>/dev/null | awk 'NR==1 { for (i=1; i<=NF; i++) if ($i ~ /^[0-9]+$/) { print $i; exit } }')"
              if [ -n "$go_count" ] && [ "$go_count" -gt "$RELAMPO_GO_PEAK" ]; then
                RELAMPO_GO_PEAK="$go_count"
              fi
            }
            relampo_jmeter_progress() {
              local worker_pid="$1"
              local start_epoch
              local now
              local total_elapsed
              local events_file=""
              local prev_lines=1
              while kill -0 "$worker_pid" 2>/dev/null; do
                relampo_update_resource_peaks "$worker_pid"
                sleep 5
                if [ -z "$events_file" ] || [ ! -f "$events_file" ]; then
                  events_file="$(ls -1t results/node-*.events.*.jsonl 2>/dev/null | head -n1)"
                  if [ -z "$events_file" ] || [ ! -f "$events_file" ]; then
                    continue
                  fi
                  prev_lines=1
                fi
                start_epoch="${start_epoch:-$(date +%s)}"
                now="$(date +%s)"
                total_elapsed=$((now - start_epoch))

                local total_stats win_stats
                local total_count total_sum total_min total_max total_err total_p95 total_active total_active_max
                local win_count win_sum win_min win_max win_err win_p95 win_active win_active_max

                total_stats="$(relampo_extract_stats "$events_file" 1)"
                win_stats="$(relampo_extract_stats "$events_file" "$prev_lines")"
                IFS='|' read -r total_count total_sum total_min total_max total_err total_p95 total_active total_active_max <<< "$total_stats"
                IFS='|' read -r win_count win_sum win_min win_max win_err win_p95 win_active win_active_max <<< "$win_stats"

                relampo_print_summary "+" "$win_count" 5 "$win_sum" "$win_min" "$win_max" "$win_err" "$win_p95" "$win_active" "$win_active_max"
                relampo_print_summary "=" "$total_count" "$total_elapsed" "$total_sum" "$total_min" "$total_max" "$total_err" "$total_p95" "$total_active" "$total_active_max"

                prev_lines=$(( $(wc -l < "$events_file") + 1 ))
              done
            }
            PULSE_PPROF=1 RELAMPO_WORKER_LOG_MODE=table RELAMPO_WORKER_SNAPSHOT_SECONDS=0 relampo-worker --yaml "$SCENARIO_FILE" --node ${{ matrix.node }} --total 2 $VUS_FLAG $DURATION_FLAG 2>&1 | awk 'BEGIN{esc=sprintf("%c",27)} {raw=$0; line=$0; gsub(esc "\\[[0-9;]*[A-Za-z]", "", line); if (line ~ /^METHOD[[:space:]]+PATH/ || line ~ /^-+/ || line ~ /^(GET|POST|PUT|DELETE|PATCH|HEAD|OPTIONS)[[:space:]]+/ || line ~ /Duration:/ || line ~ /Test finished\./ || line ~ /❌/) { print raw; fflush(); }}' > "$OUTPUT_FILE" &
            WORKER_PID=$!
            relampo_jmeter_progress "$WORKER_PID"
            wait "$WORKER_PID"
            WORKER_STATUS=$?
            relampo_update_resource_peaks "$WORKER_PID"
            mkdir -p results
            PEAKS_FILE="results/node-${{ matrix.node }}.peaks.json"
            if [ -f "$PEAKS_FILE" ]; then
              EXIST_MEM="$(grep -Eo '"mem_peak_mb"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
              EXIST_CPU="$(grep -Eo '"cpu_peak"[[:space:]]*:[[:space:]]*[0-9]+([.][0-9]+)?' "$PEAKS_FILE" | tail -n1 | grep -Eo '[0-9]+([.][0-9]+)?' || true)"
              EXIST_GO="$(grep -Eo '"go_peak"[[:space:]]*:[[:space:]]*[0-9]+' "$PEAKS_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
              if [ -n "$EXIST_MEM" ] && [ "$EXIST_MEM" -gt "$RELAMPO_MEM_PEAK_MB" ]; then
                RELAMPO_MEM_PEAK_MB="$EXIST_MEM"
              fi
              if [ -n "$EXIST_CPU" ]; then
                RELAMPO_CPU_PEAK="$(awk -v a="$RELAMPO_CPU_PEAK" -v b="$EXIST_CPU" 'BEGIN { if (b > a) printf "%.1f", b; else printf "%.1f", a }')"
              fi
              if [ -n "$EXIST_GO" ] && [ "$EXIST_GO" -gt "$RELAMPO_GO_PEAK" ]; then
                RELAMPO_GO_PEAK="$EXIST_GO"
              fi
            fi
            printf '{"mem_peak_mb":%s,"cpu_peak":%s,"go_peak":%s}\n' "$RELAMPO_MEM_PEAK_MB" "$RELAMPO_CPU_PEAK" "$RELAMPO_GO_PEAK" > "$PEAKS_FILE"
            if [ "$RELAMPO_P95_ALERT" -eq 1 ]; then
              echo "ⅰ P90 response-time reference"
              echo "   ⚠ P90 > 8s: alert zone. User attention is at risk, and the experience may feel frustrating."
              echo "   ⚠ P90 > 15s: severe alert zone. This response time is generally beyond acceptable user expectations."
              echo ""
              echo "   Note: this alert does not automatically mean the application is slow."
              echo "   It is a reference signal based on user-experience and performance heuristics."
              echo ""
              echo "   Based on classic user response-time guidance (Jakob Nielsen: attention degrades around 10s)"
              echo "   and practical performance engineering ranges commonly associated with Scott Barber."
            fi
            CLEAN_OUTPUT_FILE="$(mktemp)"
            awk 'BEGIN{esc=sprintf("%c",27)} {line=$0; gsub(esc "\\[[0-9;]*[A-Za-z]", "", line); print line}' "$OUTPUT_FILE" > "$CLEAN_OUTPUT_FILE"
            MEM_PEAK="$(grep -Eo 'MEM Peak:[[:space:]]*[0-9]+' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
            CPU_PEAK="$(grep -Eo 'CPU Peak:[[:space:]]*[0-9]+([.][0-9]+)?' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+([.][0-9]+)?' || true)"
            GO_PEAK="$(grep -Eo 'Go:[[:space:]]*[0-9]+' "$CLEAN_OUTPUT_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
            [ -z "$MEM_PEAK" ] && MEM_PEAK=0
            [ -z "$CPU_PEAK" ] && CPU_PEAK=0
            [ -z "$GO_PEAK" ] && GO_PEAK=0
            mkdir -p results
            printf '{"mem_peak_mb":%s,"cpu_peak":%s,"go_peak":%s}\n' "$MEM_PEAK" "$CPU_PEAK" "$GO_PEAK" > "results/node-${{ matrix.node }}.peaks.json"
            rm -f "$CLEAN_OUTPUT_FILE"
            cat "$OUTPUT_FILE"
            rm -f "$OUTPUT_FILE"
            exit "$WORKER_STATUS"
          )
          if [ -d "$SCENARIO_DIR/results" ]; then
            mkdir -p results
            cp -R "$SCENARIO_DIR/results"/. results/
          fi

      - name: Upload logs/artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pulse-results-node-${{ matrix.node }}
          path: results/
