ct_info&amp;cPath=2&amp;products_id=2\"><img src=\"images/dress.jpg\" alt=\"Dresses\" title=\" Dresses \" width=\"56\" height=\"80\" /><br />Dresses</a><div><span class=\"productBasePrice\">$0.50</span></div></div>\n  <div class=\"sideBoxContentItem\"><a href=\"http://www.testingyes.com/demo/index.php?main_page=product_info&amp;cPath=1&amp;products_id=4\"><img src=\"images/tomate.jpg\" alt=\"Tomatoes\" title=\" Tomatoes \" width=\"98\" height=\"80\" /><br />Tomatoes</a><div><span class=\"productBasePrice\">$2.89</span></div></div></div>\n</div>\r\n<!--// eof: whatsnew //-->\r\n\r\n<!--// bof: reviews //-->\r\n<div class=\"leftBoxContainer\" id=\"reviews\" style=\"width: 150\">\r\n<h3 class=\"leftBoxHeading\" id=\"reviewsHeading\"><a href=\"http://www.testingyes.com/demo/index.php?main_page=reviews\">Reviews&nbsp;&nbsp;[more]</a></h3>\r\n<div id=\"reviewsContent\" class=\"sideBoxContent centeredContent\">There are currently no product reviews.</div></div>\r\n<!--// eof: reviews //-->\r\n\r\n<!--// bof: information //-->\r\n<div class=\"leftBoxContainer\" id=\"information\" style=\"width: 150\">\r\n<h3 class=\"leftBoxHeading\" id=\"informationHeading\">Information</h3>\r\n<div id=\"informationContent\" class=\"sideBoxContent\">\n<ul class=\"list-links\">\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=shippinginfo\">Shipping &amp; Returns</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=privacy\">Privacy Notice</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=conditions\">Conditions of Use</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=contact_us\">Contact Us</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=site_map\">Site Map</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=gv_faq\">Gift Certificate FAQ</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=discount_coupon\">Discount Coupons</a></li>\n<li><a href=\"http://www.testingyes.com/demo/index.php?main_page=unsubscribe\">Newsletter Unsubscribe</a></li>\n</ul>\n</div></div>\r\n<!--// eof: information //-->\r\n\r\n  </div>\n\n\n  <div class=\"col670\">\n\n<!-- bof  breadcrumb -->\n    <div id=\"navBreadCrumb\">  <a href=\"http://www.testingyes.com/demo/\">Home</a>&nbsp;::&nbsp;\n  <a href=\"http://www.testingyes.com/demo/index.php?main_page=checkout_shipping\">Checkout - Step 1</a>&nbsp;::&nbsp;\nPayment Method - Step 2\n</div>\n<!-- eof breadcrumb -->\n\n\n<!-- bof upload alerts -->\n<!-- eof upload alerts -->\n\n<script type=\"text/javascript\"><!-- \nfunction check_form() {\n  var error = 0;\n  var error_message = \"Errors have occurred during the processing of your form.\\n\\nPlease make the following corrections:\\n\\n\";\n  var payment_value = null;\n  if (document.checkout_payment.payment) {\n    if (document.checkout_payment.payment.length) {\n      for (var i=0; i<document.checkout_payment.payment.length; i++) {\n        if (document.checkout_payment.payment[i].checked) {\n          payment_value = document.checkout_payment.payment[i].value;\n        }\n      }\n    } else if (document.checkout_payment.payment.checked) {\n      payment_value = document.checkout_payment.payment.value;\n    } else if (document.checkout_payment.payment.value) {\n      payment_value = document.checkout_payment.payment.value;\n    }\n  }\n\n\n  if (payment_value == null && submitter != 1) {\n    error_message = error_message + \"* Please select a payment method for your order.\";\n    error = 1;\n  }\n\n  if (error == 1 && submitter != 1) {\n    alert(error_message);\n    return false;\n  } else {\n var result = true; \n if (result == false) doCollectsCardDataOnsite();\n    return result;\n  }\n}\n//--></script>\n<div class=\"centerColumn\" id=\"checkoutPayment\">\r\n<form name=\"checkout_payment\" action=\"http://www.testingyes.com/demo/index.php?main_page=checkout_confirmation\" method=\"post\"><input type=\"hidden\" name=\"securityToken\" value=\"15742ae54f4f319431ce549f61ea027f\" /><input type=\"hidden\" name=\"action\" value=\"submit\" />\r\n<h1 id=\"checkoutPaymentHeading\">Step 2 of 3 - Payment Information</h1>\r\n\r\n\r\n<h2 id=\"checkoutPaymentHeadingAddress\">Billing Address:</h2>\r\n\r\n<div id=\"checkoutBillto\" class=\"floatingBox back\">\r\n<div class=\"buttonRow forward\"><a href=\"http://www.testingyes.com/demo/index.php?main_page=checkout_payment_address\"><span class=\"cssButton normal_button button  button_change_address\" onmouseover=\"this.className='cssButtonHover normal_button button  button_change_address button_change_addressHover'\" onmouseout=\"this.className='cssButton normal_button button  button_change_address'\">&nbsp;Change Address&nbsp;</span></a></div>\r\n<address>Test1 Test1<br /> Test1<br /> Test1<br /> Test1, FL    11111<br /> United States</address>\r\n</div>\r\n\r\n<div class=\"floatingBox important forward\">Your billing address is shown to the left. The billing address should match the address on your credit card statement. You can change the billing address by clicking the <em>Change Address</em> button.</div>\r\n<br class=\"clearBoth\" />\r\n\r\n<fieldset id=\"checkoutOrderTotals\">\r\n<legend id=\"checkoutPaymentHeadingTotal\">Your Total</legend>\r\n<div id=\"otsubtotal\">\r\n    <div class=\"totalBox larger forward\">$1.25</div>\r\n    <div class=\"lineTitle larger forward\">Sub-Total:</div>\r\n</div>\r\n<br class=\"clearBoth\" />\r\n<div id=\"otshipping\">\r\n    <div class=\"totalBox larger forward\">$2.50</div>\r\n    <div class=\"lineTitle larger forward\">Per Item (Best Way):</div>\r\n</div>\r\n<br class=\"clearBoth\" />\r\n<div id=\"ottotal\">\r\n    <div class=\"totalBox larger forward\">$3.75</div>\r\n    <div class=\"lineTitle larger forward\">Total:</div>\r\n</div>\r\n<br class=\"clearBoth\" />\r\n</fieldset>\r\n\r\n<fieldset>\r\n<legend>Discount Coupon</legend>\r\n<p>Please type your coupon code into the box next to  Redemp